<script>
  (function () {
    const root = document.documentElement;
    const toggle = document.getElementById('theme-toggle');
    const toggleText = toggle ? toggle.querySelector('.theme-toggle-text') : null;
    const storageKey = 'site-theme';

    function applyTheme(theme) {
      root.setAttribute('data-theme', theme);
      if (toggle && toggleText) {
        const switchesToLight = theme === 'dark';
        toggleText.textContent = switchesToLight ? 'Light' : 'Dark';
        toggle.setAttribute('aria-label', switchesToLight ? 'Switch to light theme' : 'Switch to dark theme');
      }
    }

    const saved = localStorage.getItem(storageKey);
    if (saved === 'light' || saved === 'dark') {
      applyTheme(saved);
    } else {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      applyTheme(prefersDark ? 'dark' : 'light');
    }

    if (toggle) {
      toggle.addEventListener('click', function () {
        const current = root.getAttribute('data-theme') || 'light';
        const next = current === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem(storageKey, next);
      });
    }
  })();
</script>
