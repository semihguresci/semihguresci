<script>
  (function () {
    const root = document.documentElement;
    root.classList.remove('no-js');
    root.classList.add('js');

    const toggle = document.getElementById('theme-toggle');
    const toggleText = toggle ? toggle.querySelector('.theme-toggle-text') : null;
    const navToggle = document.getElementById('nav-toggle');
    const mobileNav = document.getElementById('mobile-nav');
    const storageKey = 'site-theme';

    function applyTheme(theme) {
      root.setAttribute('data-theme', theme);
      if (toggle && toggleText) {
        const switchesToLight = theme === 'dark';
        toggleText.textContent = switchesToLight ? 'Light' : 'Dark';
        toggle.setAttribute('aria-label', switchesToLight ? 'Switch to light theme' : 'Switch to dark theme');
      }
    }

    const saved = localStorage.getItem(storageKey);
    if (saved === 'light' || saved === 'dark') {
      applyTheme(saved);
    } else {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      applyTheme(prefersDark ? 'dark' : 'light');
    }

    if (toggle) {
      toggle.addEventListener('click', function () {
        const current = root.getAttribute('data-theme') || 'light';
        const next = current === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem(storageKey, next);
      });
    }

    function setMobileNav(open) {
      if (!navToggle || !mobileNav) {
        return;
      }

      navToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      navToggle.setAttribute('aria-label', open ? 'Close navigation menu' : 'Open navigation menu');
      mobileNav.setAttribute('aria-hidden', open ? 'false' : 'true');
      mobileNav.classList.toggle('is-open', open);
    }

    if (navToggle && mobileNav) {
      setMobileNav(false);

      navToggle.addEventListener('click', function () {
        const open = navToggle.getAttribute('aria-expanded') !== 'true';
        setMobileNav(open);
      });

      mobileNav.querySelectorAll('a').forEach(function (link) {
        link.addEventListener('click', function () {
          setMobileNav(false);
        });
      });

      window.addEventListener('resize', function () {
        if (window.innerWidth > 920) {
          setMobileNav(false);
        }
      });

      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') {
          setMobileNav(false);
        }
      });
    }
  })();
</script>
