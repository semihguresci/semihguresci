<header class="topbar">
  <div class="container topbar-inner">
    <a class="brand" href="{{ '/' | relative_url }}#home">{{ site.title }}</a>
    <nav class="nav" aria-label="Primary navigation">
      <a href="{{ '/' | relative_url }}#about">About</a>
      <a href="{{ '/' | relative_url }}#expertise">Expertise</a>
      <a href="{{ '/' | relative_url }}#projects">Projects</a>
      <a href="{{ '/blog/' | relative_url }}">Blog</a>
      <a href="{{ '/' | relative_url }}#experience">Experience</a>
      <a href="{{ '/' | relative_url }}#contact">Contact</a>
    </nav>
    <div class="topbar-actions">
      <button class="theme-toggle" id="theme-toggle" aria-label="Switch to dark theme">
        <span class="theme-toggle-icon icon-moon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </span>
        <span class="theme-toggle-icon icon-sun" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8"></circle>
            <path d="M12 2v2.2M12 19.8V22M4.93 4.93l1.56 1.56M17.5 17.5l1.57 1.57M2 12h2.2M19.8 12H22M4.93 19.07l1.56-1.56M17.5 6.5l1.57-1.57" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
          </svg>
        </span>
        <span class="theme-toggle-text">Dark</span>
      </button>
      <button class="nav-toggle" id="nav-toggle" aria-controls="mobile-nav" aria-expanded="false" aria-label="Open navigation menu">
        <span class="nav-toggle-icon icon-menu" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
          </svg>
        </span>
        <span class="nav-toggle-icon icon-close" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="m6 6 12 12M18 6 6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
          </svg>
        </span>
      </button>
    </div>
  </div>
  <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation" aria-hidden="true">
    <a href="{{ '/' | relative_url }}#about">About</a>
    <a href="{{ '/' | relative_url }}#expertise">Expertise</a>
    <a href="{{ '/' | relative_url }}#projects">Projects</a>
    <a href="{{ '/blog/' | relative_url }}">Blog</a>
    <a href="{{ '/' | relative_url }}#experience">Experience</a>
    <a href="{{ '/' | relative_url }}#contact">Contact</a>
  </nav>
</header>
