<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        button {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #764ba2;
        }
        #jokeDisplay {
            margin-top: 30px;
            font-size: 18px;
            color: #555;
            min-height: 60px;
            line-height: 1.6;
        }
    </style>
    <script>
        async function fetchJoke() {
            const jokeDisplay = document.getElementById('jokeDisplay');
            jokeDisplay.innerText = 'Loading...';
            try {
                const response = await fetch('https://v2.jokeapi.dev/joke/Any');
                const data = await response.json();
                const joke = data.joke || `${data.setup} - ${data.delivery}`;
                jokeDisplay.innerText = joke;
            } catch (error) {
                console.error('Error fetching joke:', error);
                jokeDisplay.innerText = 'Failed to fetch a joke. Please try again!';
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>😂 Random Joke Generator</h1>
        <button onclick="fetchJoke()">Tell me a joke</button>
        <p id="jokeDisplay"></p>
    </div>
</body>
</html>
