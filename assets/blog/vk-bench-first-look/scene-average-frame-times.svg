<svg width="800" height="420" viewBox="0 0 800 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="avgTitle avgDesc">
  <title id="avgTitle">vk-bench average frame times by scene</title>
  <desc id="avgDesc">Average CPU and GPU frame times for triangle, million-tris, and compute-copy using checked-in benchmark results.</desc>
  <rect width="800" height="420" fill="#FCFCFD"/>
  <rect x="24" y="24" width="752" height="372" rx="18" fill="white" stroke="#E5E7EB"/>
  <text x="48" y="64" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Average frame time by scene</text>
  <text x="48" y="90" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif" font-size="13">Headless, 1920x1080, 30 recorded frames after 5 warmup frames, NVIDIA GeForce RTX 2080 SUPER. Lower is better.</text>

  <line x1="170" y1="118" x2="700" y2="118" stroke="#D1D5DB"/>
  <line x1="170" y1="118" x2="170" y2="320" stroke="#D1D5DB"/>
  <line x1="170" y1="118" x2="170" y2="320" stroke="#E5E7EB"/>
  <line x1="223" y1="118" x2="223" y2="320" stroke="#F3F4F6"/>
  <line x1="276" y1="118" x2="276" y2="320" stroke="#F3F4F6"/>
  <line x1="382" y1="118" x2="382" y2="320" stroke="#F3F4F6"/>
  <line x1="488" y1="118" x2="488" y2="320" stroke="#F3F4F6"/>
  <line x1="594" y1="118" x2="594" y2="320" stroke="#F3F4F6"/>
  <line x1="700" y1="118" x2="700" y2="320" stroke="#F3F4F6"/>

  <text x="170" y="342" text-anchor="middle" fill="#6B7280" font-family="Segoe UI, Arial, sans-serif" font-size="12">0 ms</text>
  <text x="223" y="342" text-anchor="middle" fill="#6B7280" font-family="Segoe UI, Arial, sans-serif" font-size="12">1</text>
  <text x="276" y="342" text-anchor="middle" fill="#6B7280" font-family="Segoe UI, Arial, sans-serif" font-size="12">2</text>
  <text x="382" y="342" text-anchor="middle" fill="#6B7280" font-family="Segoe UI, Arial, sans-serif" font-size="12">4</text>
  <text x="488" y="342" text-anchor="middle" fill="#6B7280" font-family="Segoe UI, Arial, sans-serif" font-size="12">6</text>
  <text x="594" y="342" text-anchor="middle" fill="#6B7280" font-family="Segoe UI, Arial, sans-serif" font-size="12">8</text>
  <text x="700" y="342" text-anchor="middle" fill="#6B7280" font-family="Segoe UI, Arial, sans-serif" font-size="12">10</text>

  <text x="48" y="160" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">triangle</text>
  <text x="48" y="230" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">million-tris</text>
  <text x="48" y="300" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">compute-copy</text>

  <line x1="170" y1="148" x2="174.21" y2="148" stroke="#F97316" stroke-width="3"/>
  <rect x="168.21" y="142" width="12" height="12" rx="2" fill="#F97316"/>
  <text x="188" y="152" fill="#9A3412" font-family="Segoe UI, Arial, sans-serif" font-size="12">CPU 0.0795 ms</text>

  <line x1="170" y1="172" x2="170.48" y2="172" stroke="#2563EB" stroke-width="3"/>
  <circle cx="170.48" cy="172" r="6" fill="#2563EB"/>
  <text x="188" y="176" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="12">GPU 0.0090 ms</text>

  <line x1="170" y1="218" x2="209.93" y2="218" stroke="#F97316" stroke-width="3"/>
  <rect x="203.93" y="212" width="12" height="12" rx="2" fill="#F97316"/>
  <text x="223" y="222" fill="#9A3412" font-family="Segoe UI, Arial, sans-serif" font-size="12">CPU 0.7534 ms</text>

  <line x1="170" y1="242" x2="206.84" y2="242" stroke="#2563EB" stroke-width="3"/>
  <circle cx="206.84" cy="242" r="6" fill="#2563EB"/>
  <text x="223" y="246" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="12">GPU 0.6951 ms</text>

  <line x1="170" y1="288" x2="616.74" y2="288" stroke="#F97316" stroke-width="3"/>
  <rect x="610.74" y="282" width="12" height="12" rx="2" fill="#F97316"/>
  <text x="628" y="292" fill="#9A3412" font-family="Segoe UI, Arial, sans-serif" font-size="12">CPU 8.4291 ms</text>

  <line x1="170" y1="312" x2="611.14" y2="312" stroke="#2563EB" stroke-width="3"/>
  <circle cx="611.14" cy="312" r="6" fill="#2563EB"/>
  <text x="628" y="316" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="12">GPU 8.3235 ms</text>

  <line x1="48" y1="360" x2="752" y2="360" stroke="#E5E7EB"/>
  <rect x="190" y="369" width="18" height="18" rx="3" fill="#F97316"/>
  <text x="216" y="383" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="13">CPU submit-to-complete</text>
  <circle cx="502" cy="378" r="9" fill="#2563EB"/>
  <text x="520" y="383" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="13">GPU timestamp region</text>
</svg>
