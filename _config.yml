# Site Settings
title: My Site
email: your-email@example.com
description: >-
  Your site description here
url: "https://semihguresci.github.io"
baseurl: ""

# Theme
theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "default"

# Site Author
author:
  name   : "Your Name"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "Your bio here"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/semihguresci"

# Build settings
markdown: kramdown
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Pagination
paginate: 5
paginate_path: /page:num/