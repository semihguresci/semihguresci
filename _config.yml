locale: "en-US"
title: "Semih Guresci"
title_separator: "-"
name: "Semih Guresci"
description: "Personal website, notes, and links for Semih Guresci."
url: "https://semihguresci.com"
baseurl: ""
repository: "semihguresci/semihguresci"

remote_theme: "mmistakes/minimal-mistakes@4.28.0"
minimal_mistakes_skin: "sunrise"

markdown: kramdown
permalink: /:categories/:title/

author:
  name: "Semih Guresci"
  bio: "Personal website, notes, and links."
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/semihguresci"
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://semihguresci.com"

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-include-cache

include:
  - _pages

defaults:
  - scope:
      path: ""
    values:
      layout: single
      author_profile: true

atom_feed:
  hide: true

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/semihguresci"
